<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Arial', sans-serif;
}

body {
  padding: 20px;
  background-color: #f0f8ff; 
}

.navbar {
  background-color: #4dabf7; 
  display: flex;
  justify-content: space-between; 
  align-items: center;
  padding: 15px 30px;
  border-radius: 8px;
  color: white;
}

.logo {
  font-size: 1.5rem;
  font-weight: bold;
}


.nav-links {
  display: flex;
  list-style: none;
  gap: 25px; 
}

.nav-links a {
  text-decoration: none;
  color: white;
  font-size: 1rem;
  font-weight: 500;
  transition: opacity 0.3s ease;
}
div{
  margin-left: 30px;
}
h1{
  color: rgb(0, 76, 139);
  font-size: 73px;
}
h2{
  color: #4dabf7;
  font-size: 70px;
  padding: 10px;
}
img{
  margin-top: 100px;
  padding: 10px;
}
</style>
<body>
  <nav class="navbar">
    <div class="logo">NavBar</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Features</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Our Work</a></li>
    </ul>
  </nav>
  <div>
    <h1>
      Navigation Bar <img src="nav.png" alt="">
    </h1>
    <h2>
      Using HTML & CSS
    </h2>
  </div>



</body>
</html>
