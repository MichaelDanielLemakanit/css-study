<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        body{
            background-color: tomato;
            color: black;
        }
        .navbar{
            background-color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 10px;
            padding: 0 0 0 15px;
        }
        .navbar a{
            color: tomato;
            text-decoration: none;
            list-style: none;
            margin: 0 20px 0 0;
        }
        .navbar .list{
            list-style: none;
            display: flex;
        }

    </style>
</head>
<body>
    <div class="navbar">
        <a href="">NavBar</a>
        <ul class="list">
            <a href=""><li>Home</li></a>
            <a href=""><li>Features</li></a>
            <a href=""><li>Services</li></a>
            <a href=""><li>Our Work</li></a>
        </ul>
    </div>
</body>
</html>
