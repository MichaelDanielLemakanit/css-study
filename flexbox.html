<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .container{
            background-color: tomato;
            color: white;
            padding:10px;
            display: flex;
            justify-content:space-around;
            gap: 10px;
        }
        .box1{
            background-color: green;
            height: 100px;
            width: 200px;
            display: flex;
            align-items: center;
        }
        .box2{
            background-color: blue;
            height: 100px;
            width: 200px;
        }
        .box3{
            background-color: yellow;
            height: 100px;
            color: black;
            width: 200px;
        }
        .box4{
            background-color: maroon;
            height: 100px;
            width: 200px;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="box1"><h1>box 1</h1></div>
        <div class="box2"><h1>box 2</h1></div>
        <div class="box3"><h1>box 3</h1></div>
        <div class="box4"><h1>box 4</h1></div>
    </div>
</body>
</html>
